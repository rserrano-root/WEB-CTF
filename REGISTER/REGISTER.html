<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — NEXUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="./register.css">
</head>

<body>
<div class="grid-bg"></div>
<div class="particles" id="particles"></div>
<nav>
  <a class="nav-logo" href="../LOGIN/LOGIN.html"><span class="bracket">[</span>NEXUS<span class="bracket">]</span></a>
  <div class="nav-status"><div class="status-dot"></div>SECURE_CONN :: TLS_1.3</div>
  <div class="nav-links">
    <a class="nav-btn" href="../LOGIN/LOGIN.html">Login</a>
    <a class="nav-btn active" href="./REGISTER.html">Register</a>
    <a class="nav-btn" href="../DOC/documentation.html">Docs</a>
  </div>
</nav>

<main class="page-shell auth-layout">
  <div class="auth-container">
    <div class="auth-panel">
      <div class="terminal-line">&gt; generating_access_token... PENDING</div>
      <div class="auth-badge">Nouveau compte</div>
      <h1 class="auth-title">REGISTER</h1>
      <p class="auth-subtitle">Créer un profil opérateur sécurisé</p>
      <div class="alert" id="register-alert">ERROR — Tous les champs sont requis</div>

      <div class="field-group">
        <label class="field-label" for="reg-username">Username</label>
        <div class="field-wrapper">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input class="field-input" id="reg-username" type="text" placeholder="ghost-operator" autocomplete="off">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="reg-email">Email</label>
        <div class="field-wrapper">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input class="field-input" id="reg-email" type="email" placeholder="op@nexus.sec" autocomplete="off">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="reg-password">Passphrase</label>
        <div class="field-wrapper">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="field-input" id="reg-password" type="password" placeholder="min. 8 caractères" autocomplete="off">
        </div>
        <div class="strength-bar" id="strength-bar">
          <div class="strength-seg s1" id="seg1"></div>
          <div class="strength-seg s2" id="seg2"></div>
          <div class="strength-seg s3" id="seg3"></div>
          <div class="strength-seg s4" id="seg4"></div>
        </div>
      </div>

      <label class="field-checkbox">
        <input type="checkbox" id="reg-terms">
        <span>J’accepte les conditions d’utilisation et la politique de sécurité NEXUS.</span>
      </label>

      <button class="btn-primary" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
          <line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/>
        </svg>
        CRÉER LE COMPTE
      </button>

      <div class="auth-divider"><span>ou</span></div>
      <div class="auth-link-row">Déjà enregistré ? &nbsp;
        <a class="auth-link" href="../LOGIN/LOGIN.html">Se connecter →</a>
      </div>
    </div>
  </div>
</main>
  <script src="./register.js" defer></script>
</body>
</html>
