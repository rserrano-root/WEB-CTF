<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — NEXUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg-void:#020408;--bg-deep:#040c14;--bg-panel:rgba(6,18,32,.85);--bg-glass:rgba(0,200,255,.04);--neon-cyan:#00d4ff;--neon-blue:#0066ff;--neon-green:#00ff88;--neon-red:#ff2d55;--neon-purple:#a855f7;--text-primary:#e0f4ff;--text-secondary:#6899b8;--text-muted:#2a4a62;--border-glow:rgba(0,212,255,.25);--border-dim:rgba(0,212,255,.08);--shadow-neon:0 0 20px rgba(0,212,255,.15),0 0 60px rgba(0,212,255,.05);--shadow-strong:0 0 40px rgba(0,212,255,.3);--transition:all .25s cubic-bezier(.4,0,.2,1)}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:'Rajdhani',sans-serif;background:var(--bg-void);color:var(--text-primary);min-height:100vh;overflow-x:hidden;cursor:crosshair}body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:9999;opacity:.4}.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}.grid-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 30%,var(--bg-void) 100%)}.particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}.particle{position:absolute;width:2px;height:2px;background:var(--neon-cyan);border-radius:50%;animation:float-particle linear infinite;opacity:0}@keyframes float-particle{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-10vh) translateX(30px);opacity:0}}nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(2,4,8,.9);border-bottom:1px solid var(--border-dim);backdrop-filter:blur(16px)}.nav-logo{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;letter-spacing:.2em;color:var(--neon-cyan);text-shadow:0 0 20px var(--neon-cyan);display:flex;align-items:center;gap:.5rem;text-decoration:none}.nav-logo .bracket{color:var(--text-muted);font-weight:300}.nav-status{display:flex;align-items:center;gap:.4rem;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--neon-green);letter-spacing:.15em}.status-dot{width:6px;height:6px;border-radius:50%;background:var(--neon-green);box-shadow:0 0 8px var(--neon-green);animation:pulse-dot 2s ease-in-out infinite}@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}.nav-links{display:flex;gap:.25rem}.nav-btn{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.45rem 1rem;border:1px solid transparent;background:transparent;color:var(--text-secondary);cursor:pointer;transition:var(--transition);position:relative;overflow:hidden;text-decoration:none}.nav-btn::before{content:'';position:absolute;bottom:0;left:50%;right:50%;height:1px;background:var(--neon-cyan);transition:var(--transition)}.nav-btn:hover,.nav-btn.active{color:var(--neon-cyan);text-shadow:0 0 12px rgba(0,212,255,.5)}.nav-btn:hover::before,.nav-btn.active::before{left:0;right:0}.nav-btn.active{border-color:var(--border-glow);background:var(--bg-glass)}.page-shell{min-height:100vh;padding-top:64px;position:relative;z-index:2}.auth-layout{width:100%;display:flex;align-items:center;justify-content:center;padding:2rem;min-height:calc(100vh - 64px)}.auth-container{width:100%;max-width:440px;position:relative}.auth-container::before,.auth-container::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--neon-cyan);border-style:solid;opacity:.6}.auth-container::before{top:-1px;left:-1px;border-width:2px 0 0 2px}.auth-container::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}.auth-panel{background:var(--bg-panel);border:1px solid var(--border-dim);backdrop-filter:blur(24px);padding:2.5rem;position:relative;animation:panel-appear .5s cubic-bezier(.4,0,.2,1)}@keyframes panel-appear{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.auth-panel::before,.auth-panel::after{content:'';position:absolute;width:14px;height:14px;border-color:rgba(0,212,255,.4);border-style:solid}.auth-panel::before{top:12px;right:12px;border-width:2px 2px 0 0}.auth-panel::after{bottom:12px;left:12px;border-width:0 0 2px 2px}.auth-badge{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.25em;color:var(--neon-cyan);opacity:.7;text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}.auth-badge::before{content:'';display:block;width:24px;height:1px;background:var(--neon-cyan);opacity:.5}.auth-title{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:700;letter-spacing:.1em;color:var(--text-primary);margin-bottom:.4rem;text-shadow:0 0 30px rgba(0,212,255,.2)}.auth-subtitle{font-size:.9rem;color:var(--text-secondary);margin-bottom:2rem;letter-spacing:.04em}.field-group{margin-bottom:1.25rem}.field-label{display:block;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.5rem;transition:var(--transition)}.field-wrapper{position:relative}.field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted);pointer-events:none;transition:var(--transition)}.field-input{width:100%;background:rgba(0,20,40,.6);border:1px solid var(--border-dim);color:var(--text-primary);font-family:'Share Tech Mono',monospace;font-size:.88rem;padding:.75rem 1rem .75rem 2.75rem;outline:none;transition:var(--transition);letter-spacing:.05em}.field-input::placeholder{color:var(--text-muted)}.field-input:focus{border-color:var(--neon-cyan);background:rgba(0,212,255,.04);box-shadow:0 0 0 1px rgba(0,212,255,.12),inset 0 0 20px rgba(0,212,255,.02)}.field-group:focus-within .field-label,.field-group:focus-within .field-icon{color:var(--neon-cyan)}.btn-primary{width:100%;margin-top:1.75rem;padding:.9rem 2rem;font-family:'Orbitron',monospace;font-size:.78rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--neon-cyan);background:transparent;color:var(--neon-cyan);cursor:pointer;position:relative;overflow:hidden;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;gap:.6rem;text-decoration:none}.btn-primary::before{content:'';position:absolute;inset:0;background:var(--neon-cyan);transform:translateX(-101%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:-1}.btn-primary:hover{color:var(--bg-void);text-shadow:none;box-shadow:var(--shadow-strong)}.btn-primary:hover::before{transform:translateX(0)}.btn-primary:active{transform:scale(.99)}.auth-divider{display:flex;align-items:center;gap:1rem;margin:1.75rem 0 1.25rem}.auth-divider span{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;white-space:nowrap}.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border-dim)}.auth-link-row{text-align:center;font-size:.88rem;color:var(--text-secondary);letter-spacing:.03em}.auth-link{color:var(--neon-cyan);text-decoration:none;font-weight:600;position:relative;transition:var(--transition);padding-bottom:1px}.auth-link::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--neon-cyan);transform:scaleX(0);transition:transform .2s ease;transform-origin:left}.auth-link:hover{text-shadow:0 0 12px rgba(0,212,255,.6)}.auth-link:hover::after{transform:scaleX(1)}.alert{padding:.75rem 1rem;border-left:2px solid var(--neon-red);background:rgba(255,45,85,.08);font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--neon-red);letter-spacing:.08em;margin-bottom:1.25rem;display:none;animation:shake .3s ease}.alert.success{border-color:var(--neon-green);background:rgba(0,255,136,.06);color:var(--neon-green)}.alert.show{display:block}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}.terminal-line{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-muted);letter-spacing:.12em;margin-bottom:1.5rem;overflow:hidden;white-space:nowrap;border-right:1px solid var(--neon-cyan);animation:typing 2s steps(40,end) .3s both,blink-caret .75s step-end infinite 2s;width:fit-content;max-width:100%}@keyframes typing{from{width:0}to{width:100%}}@keyframes blink-caret{0%,100%{border-color:var(--neon-cyan)}50%{border-color:transparent}}@media (max-width:640px){nav{padding:0 1rem}.nav-status{display:none}.auth-panel{padding:2rem 1.5rem}.auth-layout{padding:1rem}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="particles" id="particles"></div>
<nav>
  <a class="nav-logo" href="./login.html"><span class="bracket">[</span>NEXUS<span class="bracket">]</span></a>
  <div class="nav-status"><div class="status-dot"></div>SECURE_CONN :: TLS_1.3</div>
  <div class="nav-links">
    <a class="nav-btn active" href="./login.html">Login</a>
    <a class="nav-btn" href="./register.html">Register</a>
    <a class="nav-btn" href="./documentation.html">Docs</a>
  </div>
</nav>
<main class="page-shell auth-layout">
  <div class="auth-container">
    <div class="auth-panel">
      <div class="terminal-line">&gt; initializing_secure_channel... READY</div>
      <div class="auth-badge">Authentication Portal</div>
      <h1 class="auth-title">SIGN IN</h1>
      <p class="auth-subtitle">Accès réservé aux opérateurs autorisés</p>
      <div class="alert" id="login-alert">ACCESS DENIED — Identifiants incorrects</div>
      <div class="field-group">
        <label class="field-label" for="login-email">Identifiant</label>
        <div class="field-wrapper">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input class="field-input" id="login-email" type="text" placeholder="user@nexus.sec" autocomplete="off">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="login-password">Passphrase</label>
        <div class="field-wrapper">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="field-input" id="login-password" type="password" placeholder="••••••••••••">
        </div>
      </div>
      <button class="btn-primary" type="button" onclick="handleLogin()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        AUTHENTICATE
      </button>
      <div class="auth-divider"><span>ou</span></div>
      <div class="auth-link-row">Pas encore de compte ? &nbsp;<a class="auth-link" href="./register.html">Créer un accès →</a></div>
    </div>
  </div>
</main>
<script>
const particlesContainer=document.getElementById('particles');if(particlesContainer){for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=`${Math.random()*100}%`;p.style.animationDuration=`${8+Math.random()*12}s`;p.style.animationDelay=`${Math.random()*8}s`;const size=Math.random()>.7?3:2;p.style.width=`${size}px`;p.style.height=`${size}px`;p.style.opacity=`${.3+Math.random()*.4}`;if(Math.random()>.7)p.style.background='#00ff88';if(Math.random()>.85)p.style.background='#a855f7';particlesContainer.appendChild(p)}}function setAuthState(v){if(v){document.cookie='nexus_auth=1; path=/; SameSite=Lax'}else{document.cookie='nexus_auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax'}}function isAuthenticated(){return document.cookie.split('; ').some(i=>i==='nexus_auth=1')}if(isAuthenticated()){window.location.href='./documentation.html'}function handleLogin(){const email=document.getElementById('login-email').value.trim();const pass=document.getElementById('login-password').value;const alertBox=document.getElementById('login-alert');alertBox.classList.remove('show','success');if(!email||!pass){alertBox.textContent='ERROR — Champs requis non remplis';alertBox.classList.add('show');return}if(pass.length<4){alertBox.textContent='ACCESS DENIED — Identifiants incorrects';alertBox.classList.add('show');return}alertBox.textContent='ACCESS GRANTED — Redirection en cours...';alertBox.classList.add('show','success');setAuthState(true);setTimeout(()=>window.location.href='./documentation.html',700)}document.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin()});
</script>
</body>
</html>
