version: '3.9'

services:
  db:
    image: mariadb:10.11
    container_name: nexus_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ../ctfeur.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../migration_role.sql:/docker-entrypoint-initdb.d/02_migration.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: nexus_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs

volumes:
  db_data:
